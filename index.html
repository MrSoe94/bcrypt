<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bcrypt Premium Generator & Validator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .premium-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
    </style>
</head>
<body class="text-slate-200 p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold tracking-tight mb-2">
                <span class="text-transparent bg-clip-text premium-gradient">Bcrypt</span> Premium
            </h1>
            <p class="text-slate-400">Generator hash keamanan tinggi & validator password instan.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- Section: Generator -->
            <div class="glass-card rounded-2xl p-6 shadow-2xl">
                <div class="flex items-center mb-6">
                    <div class="p-3 rounded-lg premium-gradient mr-4">
                        <i class="fas fa-lock text-white"></i>
                    </div>
                    <h2 class="text-xl font-semibold text-white">Generate Hash</h2>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Plain Text / Password</label>
                        <input type="text" id="genInput" placeholder="Masukkan teks..." 
                               class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1 flex justify-between">
                            <span>Cost Factor (Rounds)</span>
                            <span id="costVal" class="text-purple-400 font-bold">10</span>
                        </label>
                        <input type="range" id="costRange" min="4" max="15" value="10" 
                               class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-purple-500">
                        <p class="text-[10px] text-slate-500 mt-1 italic">Semakin tinggi semakin aman, tapi lebih lambat.</p>
                    </div>

                    <button onclick="generateBcrypt()" 
                            class="w-full premium-gradient hover:opacity-90 text-white font-bold py-3 rounded-lg shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2">
                        <i class="fas fa-cog"></i> Generate Hash
                    </button>

                    <div id="genResultBox" class="hidden">
                        <label class="block text-sm font-medium text-slate-400 mb-1">Hasil Hash</label>
                        <div class="relative">
                            <textarea id="genResult" readonly 
                                      class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-sm font-mono text-green-400 focus:outline-none resize-none h-24"></textarea>
                            <button onclick="copyToClipboard('genResult')" 
                                    class="absolute top-2 right-2 p-2 bg-slate-800 hover:bg-slate-700 rounded text-slate-300 transition-colors">
                                <i class="fas fa-copy"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Section: Validator -->
            <div class="glass-card rounded-2xl p-6 shadow-2xl">
                <div class="flex items-center mb-6">
                    <div class="p-3 rounded-lg bg-emerald-500 mr-4">
                        <i class="fas fa-shield-check text-white text-xl"></i>
                    </div>
                    <h2 class="text-xl font-semibold text-white">Validasi Hash</h2>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Plain Text</label>
                        <input type="text" id="valInput" placeholder="Masukkan teks asli..." 
                               class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Bcrypt Hash</label>
                        <textarea id="valHash" placeholder="Paste hash di sini ($2a$...)" 
                                  class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all h-20 resize-none font-mono text-sm"></textarea>
                    </div>

                    <button onclick="validateBcrypt()" 
                            class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2">
                        <i class="fas fa-vial"></i> Verifikasi
                    </button>

                    <div id="valResult" class="hidden rounded-lg p-4 text-center font-bold">
                        <!-- Content via JS -->
                    </div>
                </div>
            </div>

        </div>

        <!-- Footer Info -->
        <footer class="mt-12 text-center text-slate-500 text-sm">
            <p>© 2024 Bcrypt Premium Generator. <br class="md:hidden"> Diproses secara lokal di browser Anda untuk privasi maksimal.</p>
        </footer>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-5 right-5 bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl border border-slate-700 transform translate-y-20 transition-transform duration-300 flex items-center gap-3">
        <i class="fas fa-check-circle text-green-400"></i>
        <span id="toastMsg">Tersalin!</span>
    </div>

    <script>
        const bcrypt = dcodeIO.bcrypt;

        // Update UI range
        document.getElementById('costRange').addEventListener('input', (e) => {
            document.getElementById('costVal').innerText = e.target.value;
        });

        async function generateBcrypt() {
            const input = document.getElementById('genInput').value;
            const cost = parseInt(document.getElementById('costRange').value);
            
            if (!input) {
                showToast("Masukkan teks terlebih dahulu!", "error");
                return;
            }

            try {
                const salt = bcrypt.genSaltSync(cost);
                const hash = bcrypt.hashSync(input, salt);
                
                document.getElementById('genResult').value = hash;
                document.getElementById('genResultBox').classList.remove('hidden');
                showToast("Hash berhasil dibuat!");
            } catch (err) {
                showToast("Terjadi kesalahan teknis.", "error");
            }
        }

        async function validateBcrypt() {
            const plain = document.getElementById('valInput').value;
            const hash = document.getElementById('valHash').value;
            const resDiv = document.getElementById('valResult');

            if (!plain || !hash) {
                showToast("Lengkapi kedua kolom!", "error");
                return;
            }

            resDiv.classList.remove('hidden');
            resDiv.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Memproses...';
            resDiv.className = "rounded-lg p-4 text-center font-bold bg-slate-800 text-slate-300 mt-4";

            // Delay sedikit untuk memberi kesan proses "premium"
            setTimeout(() => {
                try {
                    const isValid = bcrypt.compareSync(plain, hash);
                    
                    if (isValid) {
                        resDiv.innerHTML = '<i class="fas fa-check-circle mr-2"></i> MATCH! Password Valid.';
                        resDiv.className = "rounded-lg p-4 text-center font-bold bg-emerald-900/40 text-emerald-400 border border-emerald-500 mt-4";
                    } else {
                        resDiv.innerHTML = '<i class="fas fa-times-circle mr-2"></i> FAILED! Hash Tidak Cocok.';
                        resDiv.className = "rounded-lg p-4 text-center font-bold bg-red-900/40 text-red-400 border border-red-500 mt-4";
                    }
                } catch (err) {
                    resDiv.innerHTML = '<i class="fas fa-exclamation-triangle mr-2"></i> Hash tidak valid (Format Salah).';
                    resDiv.className = "rounded-lg p-4 text-center font-bold bg-orange-900/40 text-orange-400 border border-orange-500 mt-4";
                }
            }, 600);
        }

        function copyToClipboard(elementId) {
            const copyText = document.getElementById(elementId);
            copyText.select();
            document.execCommand("copy");
            showToast("Hash disalin ke clipboard!");
        }

        function showToast(msg, type = "success") {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMsg');
            
            msgEl.innerText = msg;
            toast.style.transform = "translateY(0)";
            
            setTimeout(() => {
                toast.style.transform = "translateY(100px)";
            }, 3000);
        }
    </script>
</body>
</html>
